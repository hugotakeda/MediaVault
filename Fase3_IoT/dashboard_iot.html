<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle IoT - NAS Familiar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --subtext: #94a3b8;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .header h1 {
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .header p {
            color: #dbeafe;
            margin-top: 10px;
        }
        .trigger-bar {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-trigger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-trigger:hover {
            background: #dc2626;
            transform: scale(1.05);
        }
        .btn-trigger:active {
            transform: scale(0.95);
        }
        #logs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .log-card {
            background: var(--card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .log-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .photo-container {
            width: 100%;
            height: 200px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .info {
            padding: 20px;
        }
        .info h3 {
            margin: 0;
            font-size: 1em;
            color: #fff;
        }
        .info p {
            color: var(--subtext);
            font-size: 0.85em;
            margin: 8px 0 0 0;
        }
        .timestamp {
            font-family: monospace;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📸 Central IoT - NAS Familiar</h1>
        <p>Monitoramento Visual em Tempo Real</p>
    </div>

    <div class="trigger-bar">
        <button class="btn-trigger" onclick="forceTrigger()">🚨 DISPARAR CÂMERA AGORA</button>
        <p id="trigger-status" style="font-size: 0.8em; margin-top: 10px; color: #94a3b8;"></p>
    </div>

    <div id="logs-container">
        <!-- Logs injetados aqui -->
    </div>
</div>

<script>
    async function forceTrigger() {
        const status = document.getElementById('trigger-status');
        status.innerText = 'Enviando sinal para a ESP32...';
        try {
            const res = await fetch('/upload-event', { method: 'POST' });
            if(res.ok) status.innerText = 'Sinal enviado! Aguardando captura...' ;
            else status.innerText = 'Erro ao enviar sinal.';
        } catch(e) {
            status.innerText = 'Erro de rede.';
        }
        setTimeout(() => status.innerText = '', 3000);
    }

    async function carregarLogs() {
        try {
            const resposta = await fetch('/api/logs');
            const logs = await resposta.json();
            const container = document.getElementById('logs-container');
            
            if(logs.length === 0) {
                container.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Aguardando eventos...</p>';
                return;
            }

            container.innerHTML = logs.map(log => `
                <div class="log-card">
                    <div class="photo-container">
                        <span class="status-badge">Captura IoT</span>
                        <img src="/static/captures/${log.image}" onerror="this.src='https://via.placeholder.com/300x200?text=Processando+Imagem...'">
                    </div>
                    <div class="info">
                        <h3>👤 ${log.user}</h3>
                        <p>${log.type === "foto" ? "🖼️ Foto enviada" : "📁 Arquivo enviado"}</p>
                        <p class="timestamp">🕐 ${log.timestamp}</p>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Erro ao carregar logs:', error);
        }
    }

    carregarLogs();
    setInterval(carregarLogs, 3000);
</script>

</body>
</html>
