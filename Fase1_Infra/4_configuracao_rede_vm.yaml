# Configuração de IP Estático da VM (Netplan no Ubuntu Server 22.04 LTS)

Para que o NAS funcione de maneira previsível na sua LAN isolada e sempre possa ser acessado pelo mesmo IP, precisamos configurar um **IP Estático** usando o Netplan.

Supondo que a sua rede LAN criada pelo Compartilhamento do Mac esteja rodando na faixa `192.168.10.0/24`, vamos fixar o IP do NAS em `192.168.10.10`.

*(Nota: Confirme a faixa de IP real através do comando `ifconfig bridge100` no Mac. Se a rede for `192.168.100.X`, ajuste todas as menções de `10` para `100`)*.

---

## Passo a Passo

1. Conecte-se à VM e descubra qual é o nome da interface de rede principal (que está em modo Bridge no UTM):
   ```bash
   ip a
   ```
   *Geralmente o nome no Ubuntu Server costuma ser `enp0s2`, `enp0s3` ou `eth0`.*

2. Abra o arquivo de configuração do Netplan (geralmente existe um único arquivo `.yaml` no diretório `/etc/netplan/`):
   ```bash
   sudo nano /etc/netplan/00-installer-config.yaml
   ```

3. Modifique (ou adicione) o conteúdo do arquivo com uma indentação YAML precisa (não use abas, apenas espaços):

```yaml
network:
  version: 2
  ethernets:
    enp0s2:                  # <- MUDE para o nome exato da sua interface
      dhcp4: false
      addresses:
        - 192.168.10.10/24   # O IP fixo que você escolheu para o NAS
      routes:
        - to: default
          via: 192.168.10.1    # O IP do Roteador (Seu MacBook)
      nameservers:
        addresses:
          - 192.168.10.1     # DNS do MacBook
          - 8.8.8.8          # DNS secundário do Google (caso haja internet)
```

4. Salve e feche o arquivo (`Ctrl+O` > `Enter` > `Ctrl+X`).

5. Aplique as novas configurações de rede:
   ```bash
   sudo netplan apply
   ```

6. **Teste a configuração:**
   ```bash
   ip a
   ping 192.168.10.1
   ```
   Se o IP aparecer como `192.168.10.10` e conseguir pingar o MacBook (IP `.1`), o servidor já está perfeitamente visível e fixado na rede!
